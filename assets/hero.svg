<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="FLYWHEEL — A tiny, dependency-free RL brain that learns which approach wins for each task type — and recommends the best next move.">
  <defs>
    <style>
      :root { color-scheme: light dark; }
      .bg    { fill: #0A0D12; }
      .grid  { stroke: #F5A623; stroke-opacity: .07; }
      .title { fill: #E6EDF3; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; font-weight: 700; }
      .tag   { fill: #8B98A5; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; }
      .accent{ fill: #F5A623; }
      .chip  { fill: #11151d; stroke: #1e2733; }
      .chipt { fill: #8B98A5; font-family: ui-monospace,monospace; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #EEF3F1; } .title { fill: #0F1720; } .tag { fill: #4d5b57; }
        .chip { fill: #ffffff; stroke: #dbe4df; } .chipt { fill: #4d5b57; } .grid { stroke-opacity: .10; }
      }
    </style>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse">
      <path class="grid" d="M44 0H0V44" fill="none" stroke-width="1"/>
    </pattern>
  </defs>

  <rect class="bg" width="1200" height="340"/>
  <rect width="1200" height="340" fill="url(#g)"/>

  <!-- accent bar -->
  <rect class="accent" x="72" y="120" width="6" height="100" rx="3"/>

  <!-- eyebrow -->
  <text class="accent" x="98" y="108" font-family="ui-monospace,monospace" font-size="15" letter-spacing="6" font-weight="600">TASK-LEVEL REINFORCEMENT LEARNING</text>

  <!-- title -->
  <text class="title" x="96" y="188" font-size="76">⚙️ FLYWHEEL</text>

  <!-- tagline -->
  <text class="tag" x="98" y="232" font-size="22">A tiny, dependency-free RL brain that learns which approach wins for each task type — and recommends the best next move.</text>

  <!-- chips -->
  <rect class="chip" x="96" y="272" width="207" height="30" rx="15"/>
  <text class="chipt" x="109" y="292" font-size="13">reinforcement-learning</text>
  <rect class="chip" x="315" y="272" width="72" height="30" rx="15"/>
  <text class="chipt" x="328" y="292" font-size="13">bandit</text>
  <rect class="chip" x="399" y="272" width="56" height="30" rx="15"/>
  <text class="chipt" x="412" y="292" font-size="13">grpo</text>
  <rect class="chip" x="467" y="272" width="72" height="30" rx="15"/>
  <text class="chipt" x="480" y="292" font-size="13">policy</text>
  <rect class="chip" x="551" y="272" width="98" height="30" rx="15"/>
  <text class="chipt" x="564" y="292" font-size="13">zero-deps</text>
</svg>
